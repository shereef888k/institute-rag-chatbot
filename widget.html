<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QTest Chat Widget</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f7fb;
    }

    .chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d2df8, #4b48ff);
      color: white;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(75, 72, 255, 0.35);
      z-index: 1000;
    }

    .chat-widget {
      position: fixed;
      bottom: 95px;
      right: 20px;
      width: 380px;
      max-width: calc(100vw - 24px);
      height: 560px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      display: none;
      flex-direction: column;
      border: 1px solid #e7ebf3;
      z-index: 999;
    }

    .chat-widget.open {
      display: flex;
    }

    .chat-header {
      background: linear-gradient(135deg, #2d2df8, #4b48ff);
      color: white;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-title {
      font-size: 18px;
      font-weight: 700;
    }

    .chat-close {
      background: transparent;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #f8faff;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg-row {
      display: flex;
      width: 100%;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .msg-row.bot {
      justify-content: flex-start;
    }

    .msg {
      max-width: 85%;
      padding: 13px 15px;
      border-radius: 15px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user {
      background: linear-gradient(135deg, #2d2df8, #4b48ff);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .msg.bot {
      background: #eef2f7;
      color: #1f2937;
      border: 1px solid #e4e9f1;
      border-bottom-left-radius: 6px;
    }

    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #e8ecf3;
      background: #fff;
    }

    .chat-input input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #d5dbe7;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
    }

    .chat-input input:focus {
      border-color: #4b48ff;
      box-shadow: 0 0 0 3px rgba(75, 72, 255, 0.12);
    }

    .chat-input button {
      min-width: 78px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2d2df8, #4b48ff);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .typing {
      font-style: italic;
      color: #6b7280;
    }

    @media (max-width: 480px) {
      .chat-widget {
        right: 12px;
        bottom: 85px;
        width: calc(100vw - 24px);
        height: 70vh;
      }

      .chat-toggle {
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>

  <button class="chat-toggle" onclick="toggleChat()">💬</button>

  <div class="chat-widget" id="chatWidget">
    <div class="chat-header">
      <div class="chat-title">QTest Solutions</div>
      <button class="chat-close" onclick="toggleChat()">×</button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="msg-row bot">
        <div class="msg bot">Hello 👋

I am the QTest Solutions assistant.

You can ask me about:
- Services
- Training programs
- Location
- Contact details</div>
      </div>
    </div>

    <div class="chat-input">
      <input
        type="text"
        id="userInput"
        placeholder="Type your question..."
        autocomplete="off"
      />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatWidget = document.getElementById("chatWidget");
    const chatMessages = document.getElementById("chatMessages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    function toggleChat() {
      chatWidget.classList.toggle("open");
    }

    function addMessage(text, sender) {
      const row = document.createElement("div");
      row.className = `msg-row ${sender}`;

      const msg = document.createElement("div");
      msg.className = `msg ${sender}`;
      msg.textContent = text;

      row.appendChild(msg);
      chatMessages.appendChild(row);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addTyping() {
      const row = document.createElement("div");
      row.className = "msg-row bot";
      row.id = "typingRow";

      const msg = document.createElement("div");
      msg.className = "msg bot typing";
      msg.textContent = "Typing...";

      row.appendChild(msg);
      chatMessages.appendChild(row);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTyping() {
      const typingRow = document.getElementById("typingRow");
      if (typingRow) typingRow.remove();
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage(message, "user");
      userInput.value = "";
      sendBtn.disabled = true;
      addTyping();

      try {
        const response = await fetch("http://127.0.0.1:5000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        removeTyping();
        addMessage(data.reply || "Sorry, I couldn't process that request.", "bot");
      } catch (error) {
        removeTyping();
        addMessage("Server error. Please make sure app.py is running.", "bot");
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    userInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
